name: Mise à jour des devises

on:
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: write

jobs:
  update-fx:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Actualiser les taux de change
        run: python scripts/update_fx.py

      - name: Enregistrer les changements
        run: |
          if git diff --quiet -- data/exchange_rates.json data/metadata.json; then
            echo "Aucun changement."
            exit 0
          fi
          git config user.name "tesla-charge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/exchange_rates.json data/metadata.json
          git commit -m "Mise à jour automatique des devises"
          git push
