name: Mise à jour des devises

on:
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-fx-main
  cancel-in-progress: false

jobs:
  update-fx:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Actualiser les taux de change
        run: |
          set -euo pipefail
          python scripts/update_fx.py
          echo "--- data/exchange_rates.json ---"
          cat data/exchange_rates.json

      - name: Vérifier le fichier généré
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path('data/exchange_rates.json')
          data = json.loads(p.read_text(encoding='utf-8'))
          required = {'base', 'date', 'providerDate', 'checkedAt', 'source', 'rates'}
          missing = required - data.keys()
          if missing:
              raise SystemExit(f"Champs manquants : {sorted(missing)}")
          for code in ('EUR', 'CHF', 'GBP', 'MAD'):
              value = data['rates'].get(code)
              if not isinstance(value, (int, float)) or value <= 0:
                  raise SystemExit(f"Taux invalide pour {code}: {value!r}")
          print(f"Validation OK — date source {data['date']} — vérifié {data['checkedAt']}")
          PY

      - name: Enregistrer les changements
        run: |
          set -euo pipefail
          if git diff --quiet -- data/exchange_rates.json data/metadata.json; then
            echo "Aucun changement détecté."
            exit 0
          fi
          git config user.name "tesla-charge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/exchange_rates.json data/metadata.json
          git commit -m "Mise à jour automatique des devises"
          git push origin HEAD:main
